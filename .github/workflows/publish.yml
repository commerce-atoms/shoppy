name: Publish

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version & Publish Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm supports Trusted Publishing
        run: |
          NPM_VERSION=$(npm --version)
          echo "Node $(node --version), npm ${NPM_VERSION}"
          NPM_MAJOR=${NPM_VERSION%%.*}
          if [ "$NPM_MAJOR" -lt 11 ]; then
            echo "::error::npm ${NPM_VERSION} is too old for Trusted Publishing (need >=11.5.1). Bump runner Node version."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
